# file ~/Sites/blog/config/packages/security.yaml
# blog app security configuration for JWT SSO Bridge

security:

    # providers block defines how users are loaded
    providers:
        # we use the custom user provider standardized across the domain:
        session_user_provider:
            id: App\Security\SessionUserProvider

    firewalls:
        # dev firewall for Symfony profiler and static assets:
        dev:
            pattern: ^/(_wdt|_profiler|configurator|assets)/
            security: false

        main:
            lazy: true

            # use the custom SSO session provider defined above:
            provider: session_user_provider

            # wire up the custom authenticator:
            custom_authenticator:
                - App\Security\AuthBridgeAuthenticator

            # ensure the firewall is stateful so the session persists locally
            stateless: false

            entry_point: null

    access_control:
        # technical/infrastructure public access:
        - { path: ^/assets, roles: PUBLIC_ACCESS }
        - { path: ^/(_wdt|_profiler), roles: PUBLIC_ACCESS }
        - { path: ^/sitemap\.xml$, roles: PUBLIC_ACCESS }

        # sso handshake infrastructure paths:
        - { path: '^/([a-z]{2})?/?(signup|login|login/callback|logout|logout_local|logged_out|log-jump)', roles: PUBLIC_ACCESS }

        # public content routes specific to your blog app:
        - { path: '^/([a-z]{2})?/?(info|annales|blog|posts|about|contact|credits)', roles: PUBLIC_ACCESS }

        # homepage (locale proof):
        - { path: '^/([a-z]{2})?/?$', roles: PUBLIC_ACCESS }

        # admin area:
        - { path: '^/admin', roles: ROLE_ADMIN }

        # THE ULTIMATE GATEKEEPER
        # all other pages require a valid sso-authenticated session user:
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }
